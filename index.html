<!DOCTYPE html>
<html lang="ht">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diksyonè Kreyòl → Español</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}

body{background:#edf2f7;color:#222;padding-bottom:100px;}

header{
background:linear-gradient(135deg,#007bff,#00b894);
padding:20px;
color:white;
text-align:center;
font-size:26px;
font-weight:bold;
box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

.sub{font-size:14px;margin-top:5px;opacity:0.9;}

.container{padding:15px;}

.big-learning-box{
background:linear-gradient(135deg,#00b894,#00cec9);
padding:18px;
border-radius:20px;
margin-bottom:20px;
color:white;
box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

.search-box{display:flex;gap:10px;margin-bottom:10px;}

input{
flex:1;
padding:14px;
border:none;
border-radius:15px;
font-size:17px;
outline:none;
background:white;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

button{
border:none;
border-radius:12px;
padding:12px;
cursor:pointer;
font-weight:bold;
}

.search-btn{background:#007bff;color:white;}

.tabs{display:flex;gap:10px;margin-bottom:20px;}

.tab{
flex:1;
padding:13px;
text-align:center;
background:#dfe6e9;
border-radius:15px;
font-weight:bold;
cursor:pointer;
}

.active{background:#007bff;color:white;}

.card{
background:white;
padding:15px;
border-radius:20px;
margin-bottom:15px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.word{font-size:24px;font-weight:bold;color:#007bff;}
.translation{font-size:20px;margin-top:5px;color:#444;}

.learn-btn{background:#00b894;color:white;margin-top:10px;}
.back-btn{background:#6c5ce7;color:white;margin-top:10px;}

.empty{text-align:center;padding:30px;color:gray;}

</style>
</head>

<body>

<header>
📘 Diksyonè Kreyòl → Español
<div class="sub">Aprann • Reaprann • Pataje</div>
</header>

<div class="container">

<div class="tabs">
<div class="tab active" onclick="showPage('store')">Magazen</div>
<div class="tab" onclick="showPage('learning')">Aprann</div>
<div class="tab" onclick="showPage('known')">Konnen</div>
</div>

<div class="search-box">
<input id="searchInput" placeholder="Chèche mo..." onkeyup="liveSearch()">
</div>

<div id="storePage"></div>
<div id="learningPage" style="display:none"></div>
<div id="knownPage" style="display:none"></div>

</div>

<script>

const defaultWords = [
{kreyol:"bonjou",espanol:"hola"},

{kreyol:"tab",espanol:"mesa"},

{kreyol:"dous",espanol:"dulce"},

{kreyol:"fè",espanol:"hacer"},
{kreyol:"jwe",espanol:"jugar"},
{kreyol:"ri",espanol:"reír"}
];

let storeWords = JSON.parse(localStorage.getItem("storeWords")) || defaultWords;
let learningWords = JSON.parse(localStorage.getItem("learningWords")) || [];
let knownWords = JSON.parse(localStorage.getItem("knownWords")) || [];

function save(){
localStorage.setItem("storeWords",JSON.stringify(storeWords));
localStorage.setItem("learningWords",JSON.stringify(learningWords));
localStorage.setItem("knownWords",JSON.stringify(knownWords));
render();
}

function render(){
storePage.innerHTML = storeWords.map((w,i)=>
`<div class="card">
<div class="word">${w.kreyol}</div>
<div class="translation">${w.espanol}</div>
<button class="learn-btn" onclick="toLearn(${i})">Aprann</button>
</div>`).join("");

learningPage.innerHTML = learningWords.length ?
learningWords.map((w,i)=>
`<div class="card">
<div class="word">${w.kreyol}</div>
<div class="translation">${w.espanol}</div>
<button onclick="toKnown(${i})">Konnen</button>
</div>`).join("")
: "<div class='empty'>Pa gen mo</div>";

knownPage.innerHTML = knownWords.length ?
knownWords.map((w,i)=>
`<div class="card">
<div class="word">${w.kreyol}</div>
<div class="translation">${w.espanol}</div>
<button onclick="backStore(${i})">Reaprann</button>
</div>`).join("")
: "<div class='empty'>Pa gen mo</div>";
}

function toLearn(i){
learningWords.unshift(storeWords[i]);
storeWords.splice(i,1);
save();
}

function toKnown(i){
knownWords.unshift(learningWords[i]);
learningWords.splice(i,1);
save();
}

function backStore(i){
storeWords.unshift(knownWords[i]);
knownWords.splice(i,1);
save();
}

function showPage(p){
storePage.style.display="none";
learningPage.style.display="none";
knownPage.style.display="none";

if(p==="store") storePage.style.display="block";
if(p==="learning") learningPage.style.display="block";
if(p==="known") knownPage.style.display="block";
}

function liveSearch(){
let val = searchInput.value.toLowerCase();
document.querySelectorAll(".card").forEach(c=>{
c.style.display = c.innerText.toLowerCase().includes(val) ? "block":"none";
});
}

render();

</script>

</body>
</html>
