<!DOCTYPE html>
<html lang="ht">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diksyonè Kreyòl → Español</title>

<style>
body{margin:0;font-family:Arial;background:#edf2f7;padding-bottom:100px;}
header{
background:linear-gradient(135deg,#007bff,#00b894);
padding:20px;color:white;text-align:center;font-size:24px;font-weight:bold;
}

.container{padding:15px;}

.form-box{
background:white;padding:15px;border-radius:15px;margin-bottom:15px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

input{
width:100%;padding:12px;margin-bottom:10px;
border-radius:10px;border:1px solid #ddd;font-size:16px;
}

button{
padding:10px;border:none;border-radius:10px;
cursor:pointer;font-weight:bold;
}

.add-btn{background:#00b894;color:white;width:100%;}

.card{
background:white;padding:15px;margin-bottom:10px;
border-radius:15px;box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.word{font-size:20px;font-weight:bold;color:#007bff;}
.translation{margin-top:5px;color:#444;}

.actions{margin-top:10px;display:flex;gap:10px;flex-wrap:wrap;}

.sound{background:#ff9500;color:white;}
.web{background:#6c5ce7;color:white;}

.empty{text-align:center;color:gray;padding:20px;}
</style>
</head>

<body>

<header>
📘 Diksyonè Kreyòl → Español
</header>

<div class="container">

<!-- 🔥 ZÒN AJOUT MO -->
<div class="form-box">
<h3>➕ Ajoute nouvo mo</h3>
<input id="kreyolInput" placeholder="Mo kreyòl">
<input id="espInput" placeholder="Traduction espagnol">
<button class="add-btn" onclick="addWord()">Ajoute</button>
</div>

<!-- 📚 LIS MO -->
<div id="list"></div>

</div>

<script>

// 👉 SÈLMAN 2 MO DEFAULT
let words = JSON.parse(localStorage.getItem("words")) || [
{kreyol:"bonjou",espanol:"hola"},
{kreyol:"mwen",espanol:"yo"}
];

function save(){
localStorage.setItem("words",JSON.stringify(words));
render();
}

function addWord(){
let k = document.getElementById("kreyolInput").value.trim();
let e = document.getElementById("espInput").value.trim();

if(k==="" || e===""){
alert("Ranpli tou 2 chan yo !");
return;
}

words.unshift({kreyol:k,espanol:e});
save();

document.getElementById("kreyolInput").value="";
document.getElementById("espInput").value="";
}

function render(){
let box = document.getElementById("list");
box.innerHTML="";

if(words.length===0){
box.innerHTML="<div class='empty'>Pa gen mo</div>";
return;
}

words.forEach(w=>{
box.innerHTML += `
<div class="card">
<div class="word">${w.kreyol}</div>
<div class="translation">${w.espanol}</div>

<div class="actions">

<button class="sound" onclick="speak('${w.espanol}')">
🔊 Tande
</button>

<a class="web"
href="https://translate.google.com/?sl=ht&tl=es&text=${w.kreyol}&op=translate"
target="_blank">
🌐 Internet son
</a>

</div>
</div>
`;
});
}

function speak(text){
if('speechSynthesis' in window){
let msg = new SpeechSynthesisUtterance(text);
msg.lang = "es-ES";
speechSynthesis.speak(msg);
}else{
alert("Telefon ou pa sipòte son");
}
}

render();

</script>

</body>
</html>
