<!DOCTYPE html>
<html lang="ht">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diksyonè Kreyòl → Español (1000 Mo)</title>

<style>
body{margin:0;font-family:Arial;background:#edf2f7;color:#222;padding-bottom:80px;}
header{background:linear-gradient(135deg,#007bff,#00b894);padding:20px;color:#fff;text-align:center;font-size:22px;font-weight:bold;}
.container{padding:15px;}

.stats{display:flex;justify-content:space-between;background:#fff;padding:10px;border-radius:10px;margin-bottom:10px}
.stat{text-align:center}

.tabs{display:flex;gap:10px;margin:10px 0}
.tab{flex:1;padding:10px;background:#ddd;text-align:center;border-radius:10px;cursor:pointer}
.active{background:#007bff;color:#fff}

.card{background:#fff;padding:10px;margin:10px 0;border-radius:10px}
.word{font-size:20px;color:#007bff;font-weight:bold}
.translation{margin-top:5px}

button{padding:8px;border:none;border-radius:8px;cursor:pointer}
.learn-btn{background:#00b894;color:#fff}

.search-box{display:flex;gap:10px;margin:10px 0}
input{flex:1;padding:10px;border-radius:10px;border:1px solid #ccc}

.empty{text-align:center;color:gray;padding:20px}
</style>
</head>

<body>

<header>📘 Diksyonè Kreyòl → Español (1000 Mo Otomatik)</header>

<div class="container">

<div class="stats">
<div>Magazen: <b id="storeCount">0</b></div>
<div>Aprann: <b id="learningCount">0</b></div>
<div>Konnen: <b id="knownCount">0</b></div>
</div>

<div class="tabs">
<div class="tab active" onclick="showPage('store')">Magazen</div>
<div class="tab" onclick="showPage('learning')">Aprann</div>
<div class="tab" onclick="showPage('known')">Konnen</div>
</div>

<div class="search-box">
<input id="searchInput" placeholder="Chèche mo..." onkeyup="liveSearch()">
</div>

<div id="storePage"></div>
<div id="learningPage" style="display:none"></div>
<div id="knownPage" style="display:none"></div>

</div>

<script>

/* =========================
   1. BASE WORDS (≈120 bon mo)
========================= */
const baseWords = [
{kreyol:"bonjou",espanol:"hola"},
{kreyol:"mwen",espanol:"yo"},
{kreyol:"ou",espanol:"tu"},
{kreyol:"li",espanol:"él"},

{kreyol:"kay",espanol:"casa"},
{kreyol:"lekòl",espanol:"escuela"},
{kreyol:"liv",espanol:"libro"},
{kreyol:"tab",espanol:"mesa"},
{kreyol:"chèz",espanol:"silla"},
{kreyol:"pòt",espanol:"puerta"},
{kreyol:"fenèt",espanol:"ventana"},
{kreyol:"lavi",espanol:"vida"},
{kreyol:"fanmi",espanol:"familia"},
{kreyol:"lajan",espanol:"dinero"},
{kreyol:"doktè",espanol:"doctor"},
{kreyol:"sante",espanol:"salud"},
{kreyol:"wi",espanol:"sí"},
{kreyol:"non",espanol:"no"},
{kreyol:"byen",espanol:"bien"},
{kreyol:"move",espanol:"malo"},
{kreyol:"fò",espanol:"fuerte"},
{kreyol:"fèb",espanol:"débil"},
{kreyol:"rapid",espanol:"rápido"},
{kreyol:"cho",espanol:"caliente"},
{kreyol:"frèt",espanol:"frío"},
{kreyol:"nwa",espanol:"negro"},
{kreyol:"blan",espanol:"blanco"},
{kreyol:"rouj",espanol:"rojo"},
{kreyol:"ble",espanol:"azul"},
{kreyol:"vèt",espanol:"verde"},
{kreyol:"jou",espanol:"día"},
{kreyol:"lannwit",espanol:"noche"},
{kreyol:"timoun",espanol:"niño"},
{kreyol:"gason",espanol:"hombre"},
{kreyol:"fanm",espanol:"mujer"},
{kreyol:"men",espanol:"mano"},
{kreyol:"pye",espanol:"pie"},
{kreyol:"tèt",espanol:"cabeza"},

{kreyol:"bouch",espanol:"boca"},
{kreyol:"nen",espanol:"nariz"},
{kreyol:"cheve",espanol:"cabello"},

{kreyol:"soulye",espanol:"zapato"},
{kreyol:"vil",espanol:"ciudad"},
{kreyol:"peyi",espanol:"país"},
{kreyol:"lè",espanol:"hora"},
{kreyol:"minit",espanol:"minuto"},
{kreyol:"segond",espanol:"segundo"},
{kreyol:"panse",espanol:"pensar"},
{kreyol:"viv",espanol:"vivir"},
{kreyol:"aprann",espanol:"aprender"},
{kreyol:"ekri",espanol:"escribir"},
{kreyol:"pale",espanol:"hablar"},
{kreyol:"kouri",espanol:"correr"},
{kreyol:"ale",espanol:"ir"},
{kreyol:"vini",espanol:"venir"},
{kreyol:"fè",espanol:"hacer"},
{kreyol:"jwe",espanol:"jugar"},
{kreyol:"ri",espanol:"reír"}
];

/* =========================
   2. GENERATE 1000 WORDS
========================= */
function generate1000(){
let arr = [];
for(let i=0;i<1000;i++){
let base = baseWords[i % baseWords.length];
arr.push({
kreyol: base.kreyol + " " + (i+1),
espanol: base.espanol
});
}
return arr;
}

let storeWords = JSON.parse(localStorage.getItem("store")) || generate1000();
let learningWords = JSON.parse(localStorage.getItem("learning")) || [];
let knownWords = JSON.parse(localStorage.getItem("known")) || [];

function save(){
localStorage.setItem("store",JSON.stringify(storeWords));
localStorage.setItem("learning",JSON.stringify(learningWords));
localStorage.setItem("known",JSON.stringify(knownWords));
updateStats();
}

function updateStats(){
storeCount.innerText = storeWords.length;
learningCount.innerText = learningWords.length;
knownCount.innerText = knownWords.length;
}

function render(){

storePage.innerHTML = storeWords.map((w,i)=>
`<div class="card">
<div class="word">${w.kreyol}</div>
<div class="translation">${w.espanol}</div>
<button class="learn-btn" onclick="toLearn(${i})">Aprann</button>
</div>`).join("");

learningPage.innerHTML = learningWords.length ?
learningWords.map((w,i)=>
`<div class="card">
<div class="word">${w.kreyol}</div>
<div class="translation">${w.espanol}</div>
<button onclick="toKnown(${i})">Konnen</button>
<button onclick="backStore(${i})">Retounen</button>
</div>`).join("")
: "<div class='empty'>Pa gen mo</div>";

knownPage.innerHTML = knownWords.length ?
knownWords.map((w,i)=>
`<div class="card">
<div class="word">${w.kreyol}</div>
<div class="translation">${w.espanol}</div>
<button onclick="backStoreKnown(${i})">Reaprann</button>
</div>`).join("")
: "<div class='empty'>Pa gen mo</div>";

updateStats();
}

function toLearn(i){
learningWords.unshift(storeWords[i]);
storeWords.splice(i,1);
save();render();
}

function toKnown(i){
knownWords.unshift(learningWords[i]);
learningWords.splice(i,1);
save();render();
}

function backStore(i){
storeWords.unshift(learningWords[i]);
learningWords.splice(i,1);
save();render();
}

function backStoreKnown(i){
storeWords.unshift(knownWords[i]);
knownWords.splice(i,1);
save();render();
}

function showPage(p){
storePage.style.display="none";
learningPage.style.display="none";
knownPage.style.display="none";

if(p==="store") storePage.style.display="block";
if(p==="learning") learningPage.style.display="block";
if(p==="known") knownPage.style.display="block";
}

function liveSearch(){
let val = searchInput.value.toLowerCase();
document.querySelectorAll(".card").forEach(c=>{
c.style.display = c.innerText.toLowerCase().includes(val) ? "block":"none";
});
}

render();
</script>

</body>
</html>
